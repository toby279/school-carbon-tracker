<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>School Carbon Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      padding: 20px;
      margin: 0;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 760px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: darkgreen;
    }
    #result {
      margin-top: 16px;
      line-height: 1.7;
    }
    #map {
      width: 100%;
      height: 350px;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
      background: #f2f2f2;
    }
    .small {
      color: #555;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .school-box {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: #f8f8f8;
    }
    .summary-box {
      background: #f6fff6;
      border: 1px solid #d8ecd8;
      padding: 14px;
      border-radius: 8px;
      margin-top: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>School Carbon Tracker</h2>
  <p class="small">
    Enter your home address and choose your travel type to calculate the school-run distance and estimated CO2 emissions.
  </p>

  <label for="home"><strong>Home address</strong></label>
  <input id="home" type="text" placeholder="Start typing your address">

  <label><strong>School</strong></label>
  <div class="school-box">
    Ravenscourt Park Preparatory School<br>
    16 Ravenscourt Ave, London W6 0SL, UK
  </div>

  <label for="travelType"><strong>Travel type</strong></label>
  <select id="travelType">
    <option value="petrolCar">Petrol Car</option>
    <option value="hybridCar">Hybrid Car</option>
    <option value="dieselCar">Diesel Car</option>
    <option value="electricCar">Electric Car</option>
    <option value="bus">Bus</option>
    <option value="tube">Tube</option>
    <option value="cyclingStandard">Bike</option>
    <option value="cyclingElectric">Electric Bike</option>
    <option value="walking">Walking</option>
  </select>

  <button id="calcBtn">Calculate CO2 Emissions</button>

  <div id="result"></div>
  <div id="map"></div>
</div>

<script>
  let map;
  let directionsService;
  let directionsRenderer;
  let autocomplete;
  let selectedHomePlace = null;

  const SCHOOL = {
    name: "Ravenscourt Park Preparatory School",
    address: "16 Ravenscourt Ave, London W6 0SL, UK"
  };

  // kg CO2e per km, by mode
  const CO2_PER_KM = {
    petrolCar: 0.1645,
    hybridCar: 0.1195,
    dieselCar: 0.1670,
    electricCar: 0.0395,
    bus: 0.1160,
    tube: 0.0278,
    cyclingStandard: 0,
    cyclingElectric: 0.0025,
    walking: 0
  };

  const MODE_LABELS = {
    petrolCar: "Petrol Car",
    hybridCar: "Hybrid Car",
    dieselCar: "Diesel Car",
    electricCar: "Electric Car",
    bus: "Bus",
    tube: "Tube",
    cyclingStandard: "Bike",
    cyclingElectric: "Electric Bike",
    walking: "Walking"
  };

  function kmToMiles(km) {
    return km * 0.621371;
  }

  function getTripMultiplier(mode) {
    // Four one-way school-run legs in total:
    // 1) home -> school (parent + child)
    // 2) school -> home (parent)
    // 3) home -> school (parent)
    // 4) school -> home (parent + child)
    // For vehicle-based modes, emissions are per vehicle, so use 4 trips.
    // For passenger/person-based modes, use 2 + 1 + 1 + 2 = 6 person-trips.
    const passengerModes = ["bus", "tube", "cyclingStandard", "cyclingElectric", "walking"];
    return passengerModes.includes(mode) ? 6 : 4;
  }

  function getRouteRequest(travelType) {
    const baseRequest = {
      origin: {
        location: selectedHomePlace.geometry.location
      },
      destination: SCHOOL.address
    };

    if (travelType === "cyclingStandard" || travelType === "cyclingElectric") {
      return {
        ...baseRequest,
        travelMode: google.maps.TravelMode.BICYCLING
      };
    }

    if (travelType === "walking") {
      return {
        ...baseRequest,
        travelMode: google.maps.TravelMode.WALKING
      };
    }

    if (travelType === "bus") {
      return {
        ...baseRequest,
        travelMode: google.maps.TravelMode.TRANSIT,
        transitOptions: {
          modes: [google.maps.TransitMode.BUS]
        }
      };
    }

    if (travelType === "tube") {
      return {
        ...baseRequest,
        travelMode: google.maps.TravelMode.TRANSIT,
        transitOptions: {
          modes: [google.maps.TransitMode.SUBWAY]
        }
      };
    }

    return {
      ...baseRequest,
      travelMode: google.maps.TravelMode.DRIVING
    };
  }

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 51.4939, lng: -0.2383 },
      zoom: 13
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

    const input = document.getElementById("home");

    autocomplete = new google.maps.places.Autocomplete(input, {
      types: ["address"],
      componentRestrictions: { country: "gb" },
      fields: ["formatted_address", "geometry", "name"]
    });

    autocomplete.addListener("place_changed", () => {
      selectedHomePlace = autocomplete.getPlace();
      console.log("Selected place:", selectedHomePlace);
    });

    document.getElementById("calcBtn").addEventListener("click", calculateRouteAndCO2);
  }

  function calculateRouteAndCO2() {
    const travelType = document.getElementById("travelType").value;
    const result = document.getElementById("result");

    if (!selectedHomePlace || !selectedHomePlace.geometry || !selectedHomePlace.geometry.location) {
      result.innerHTML = '<p class="error">Please choose your home address from the autocomplete list.</p>';
      return;
    }

    result.textContent = "Calculating...";

    directionsService.route(getRouteRequest(travelType), (response, status) => {
      if (status !== "OK") {
  console.error("Directions error:", status, response);
  result.innerHTML = `<p class="error">Directions error: ${status}</p>`;
  return;
}

      directionsRenderer.setDirections(response);

      const leg = response.routes[0].legs[0];
      const oneWayKm = leg.distance.value / 1000;
      const oneWayMiles = kmToMiles(oneWayKm);
      const tripMultiplier = getTripMultiplier(travelType);
      const totalKm = oneWayKm * tripMultiplier;
      const totalMiles = kmToMiles(totalKm);
      const co2 = totalKm * CO2_PER_KM[travelType];
      const yearlyCO2 = co2 * 168;
	  const yearlyTonnes = yearlyCO2 / 1000;

      result.innerHTML = `
  <p><strong>Home:</strong> ${selectedHomePlace.formatted_address || selectedHomePlace.name}</p>
  <p><strong>School:</strong> ${SCHOOL.name}</p>
  <p><strong>Travel type:</strong> ${MODE_LABELS[travelType]}</p>
  <div class="summary-box">
    <p><strong>One-way route:</strong> ${oneWayKm.toFixed(2)} km / ${oneWayMiles.toFixed(2)} miles</p>
    <p><strong>Total school-run distance per day:</strong> ${totalKm.toFixed(2)} km / ${totalMiles.toFixed(2)} miles</p>
    <p><strong>Trip multiplier used:</strong> ${tripMultiplier} × one-way journey</p>
    <p><strong>Estimated CO2 emitted per day:</strong> ${co2.toFixed(2)} kg CO2e</p>
    <p><strong>Estimated CO2 emitted per school year (168 days):</strong> ${yearlyCO2.toFixed(2)} kg CO2e</p>
    <p><strong>Estimated CO2 emitted per school year:</strong> ${yearlyTonnes.toFixed(3)} tonnes CO2e</p>
  </div>
        <p class="small">
          Assumptions: morning school run, return home, afternoon collection, and return home again.
        </p>
      `;
    });
  }
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCnP78JvIO43qRSy32eiq3HFgnnEyuCTUI&loading=async&libraries=places&callback=initMap">
</script>

</body>
</html>
