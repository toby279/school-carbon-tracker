<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>School Carbon Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      padding: 20px;
      margin: 0;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: darkgreen;
    }
    #result {
      margin-top: 16px;
      line-height: 1.6;
    }
    #map {
      width: 100%;
      height: 350px;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
      background: #f2f2f2;
    }
    .small {
      color: #555;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .school-box {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: #f8f8f8;
    }
    gmp-place-autocomplete {
      display: block;
      width: 100%;
      margin: 8px 0;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>School Carbon Tracker</h2>
  <p class="small">
    Enter your home address and choose your car type to calculate the distance to school and your CO2 emissions.
  </p>

  <label for="home-autocomplete"><strong>Home address</strong></label>
  <gmp-place-autocomplete id="home-autocomplete"></gmp-place-autocomplete>

  <label><strong>School</strong></label>
  <div class="school-box">
    Ravenscourt Park Preparatory School<br>
    16 Ravenscourt Ave, London W6 0SL, UK
  </div>

  <label for="car"><strong>Car type</strong></label>
  <select id="car">
    <option value="petrol">Petrol</option>
    <option value="diesel">Diesel</option>
    <option value="electric">Electric</option>
  </select>

  <button id="calcBtn">Calculate CO2 Emissions</button>

  <div id="result"></div>
  <div id="map"></div>
</div>

<script>
  let map;
  let directionsService;
  let directionsRenderer;
  let selectedHomePlace = null;

  const SCHOOL = {
    name: "Ravenscourt Park Preparatory School",
    address: "16 Ravenscourt Ave, London W6 0SL, UK",
    placeId: "ChIJwxBEfjUOdkgRbuw2WbjIDYg"
  };

  const emissions = {
    petrol: 0.1294,
    diesel: 0.173,
    electric: 0
  };

  async function initMap() {
    const { Map } = await google.maps.importLibrary("maps");
    await google.maps.importLibrary("places");

    map = new Map(document.getElementById("map"), {
      center: { lat: 51.4939, lng: -0.2383 },
      zoom: 13
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      map: map
    });

    const homeAutocomplete = document.getElementById("home-autocomplete");

    homeAutocomplete.includedPrimaryTypes = ["street_address"];
    homeAutocomplete.locationBias = {
      radius: 50000,
      center: { lat: 51.5074, lng: -0.1278 }
    };

    homeAutocomplete.addEventListener("gmp-select", async ({ placePrediction }) => {
      const place = placePrediction.toPlace();
      await place.fetchFields({
        fields: ["displayName", "formattedAddress", "location"]
      });
      selectedHomePlace = place;
    });

    document.getElementById("calcBtn").addEventListener("click", calculateRouteAndCO2);
  }

  function calculateRouteAndCO2() {
    const car = document.getElementById("car").value;
    const result = document.getElementById("result");

    if (!selectedHomePlace || !selectedHomePlace.location) {
      result.innerHTML = '<p class="error">Please choose your home address from the autocomplete list.</p>';
      return;
    }

    result.textContent = "Calculating...";

    directionsService.route(
      {
        origin: {
          location: {
            lat: selectedHomePlace.location.lat(),
            lng: selectedHomePlace.location.lng()
          }
        },
        destination: {
          placeId: SCHOOL.placeId
        },
        travelMode: google.maps.TravelMode.DRIVING
      },
      (response, status) => {
        if (status !== "OK") {
          console.error("Directions error:", status, response);
          result.innerHTML = '<p class="error">No route found. Please check the selected address.</p>';
          return;
        }

        directionsRenderer.setDirections(response);

        const leg = response.routes[0].legs[0];
        const oneWayKm = leg.distance.value / 1000;
        const roundTripKm = oneWayKm * 2;
        const co2 = roundTripKm * emissions[car];

        result.innerHTML = `
          <p><strong>Home:</strong> ${selectedHomePlace.formattedAddress}</p>
          <p><strong>School:</strong> ${SCHOOL.name}</p>
          <p><strong>One-way distance:</strong> ${oneWayKm.toFixed(2)} km</p>
          <p><strong>Round-trip distance:</strong> ${roundTripKm.toFixed(2)} km</p>
          <p><strong>Estimated CO2 emitted:</strong> ${co2.toFixed(2)} kg</p>
        `;
      }
    );
  }

  window.initMap = initMap;
</script>

<script>
  (g => {
    var h, a, k, p = "The Google Maps JavaScript API",
      c = "google", l = "importLibrary", q = "__ib__", m = document,
      b = window; b = b[c] || (b[c] = {});
    var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams,
      u = () => h || (h = new Promise(async (f, n) => {
        await (a = m.createElement("script"));
        e.set("libraries", [...r] + "");
        for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
        e.set("callback", c + ".maps." + q);
        a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
        d[q] = f;
        a.onerror = () => h = n(Error(p + " could not load."));
        a.nonce = m.querySelector("script[nonce]")?.nonce || "";
        m.head.append(a);

  })({
    key: "AIzaSyCnP78JvIO43qRSy32eiq3HFgnnEyuCTUI",
    v: "weekly"
  });

  initMap();
</script>

</body>
</html>
