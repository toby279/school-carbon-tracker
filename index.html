<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>School Carbon Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      padding: 20px;
      margin: 0;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: darkgreen;
    }
    #result {
      margin-top: 16px;
      line-height: 1.6;
    }
    #map {
      width: 100%;
      height: 350px;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
      background: #f2f2f2;
    }
    .small {
      color: #555;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .school-box {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: #f8f8f8;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>School Carbon Tracker</h2>
  <p class="small">
    Enter your home address and choose your car type to calculate the distance to school and your CO2 emissions.
  </p>

  <label for="home"><strong>Home address</strong></label>
  <input id="home" type="text" placeholder="Start typing your address">

  <label><strong>School</strong></label>
  <div class="school-box">
    Ravenscourt Park Preparatory School<br>
    16 Ravenscourt Ave, London W6 0SL, UK
  </div>

  <label for="car"><strong>Car type</strong></label>
  <select id="car">
    <option value="petrol">Petrol</option>
    <option value="diesel">Diesel</option>
    <option value="electric">Electric</option>
  </select>

  <button id="calcBtn">Calculate CO2 Emissions</button>

  <div id="result"></div>
  <div id="map"></div>
</div>

<script>
  let map;
  let directionsService;
  let directionsRenderer;
  let autocomplete;
  let selectedHomePlace = null;

  const SCHOOL = {
    name: "Ravenscourt Park Preparatory School",
    address: "16 Ravenscourt Ave, London W6 0SL, UK",
    placeId: "ChIJwxBEfjUOdkgRbuw2WbjIDYg"
  };

  const emissions = {
    petrol: 0.1294,
    diesel: 0.173,
    electric: 0
  };

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 51.4939, lng: -0.2383 },
      zoom: 13
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

    const input = document.getElementById("home");

    autocomplete = new google.maps.places.Autocomplete(input, {
      types: ["address"],
      componentRestrictions: { country: "gb" },
      fields: ["formatted_address", "geometry", "name"]
    });

    autocomplete.addListener("place_changed", () => {
      selectedHomePlace = autocomplete.getPlace();
      console.log("Selected place:", selectedHomePlace);
    });

    document.getElementById("calcBtn").addEventListener("click", calculateRouteAndCO2);
  }

  function calculateRouteAndCO2() {
    const car = document.getElementById("car").value;
    const result = document.getElementById("result");

    if (!selectedHomePlace || !selectedHomePlace.geometry || !selectedHomePlace.geometry.location) {
      result.innerHTML = '<p class="error">Please choose your home address from the autocomplete list.</p>';
      return;
    }

    result.textContent = "Calculating...";

    directionsService.route(
      {
        origin: {
          location: selectedHomePlace.geometry.location
        },
        destination: {
          placeId: SCHOOL.placeId
        },
        travelMode: google.maps.TravelMode.DRIVING
      },
      (response, status) => {
        if (status !== "OK") {
          console.error("Directions error:", status, response);
          result.innerHTML = '<p class="error">No route found. Please check the selected address.</p>';
          return;
        }

        directionsRenderer.setDirections(response);

        const leg = response.routes[0].legs[0];
        const oneWayKm = leg.distance.value / 1000;
        const roundTripKm = oneWayKm * 2;
        const co2 = roundTripKm * emissions[car];

        result.innerHTML = `
          <p><strong>Home:</strong> ${selectedHomePlace.formatted_address || selectedHomePlace.name}</p>
          <p><strong>School:</strong> ${SCHOOL.name}</p>
          <p><strong>One-way distance:</strong> ${oneWayKm.toFixed(2)} km</p>
          <p><strong>Round-trip distance:</strong> ${roundTripKm.toFixed(2)} km</p>
          <p><strong>Estimated CO2 emitted:</strong> ${co2.toFixed(2)} kg</p>
        `;
      }
    );
  }
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCnP78JvIO43qRSy32eiq3HFgnnEyuCTUI&loading=async&libraries=places&callback=initMap">
</script>

</body>
</html>
